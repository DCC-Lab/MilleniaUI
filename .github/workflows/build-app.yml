name: Build standalone app

# Builds the MilleniaUI bundle for macOS, Windows, and Linux. PyInstaller does
# not cross-compile, so each platform is frozen on its own runner.
#
# Triggers:
#   * Publishing a GitHub Release -> builds all three and attaches the
#     archives to that release.
#   * Manual run (Actions -> "Build standalone app" -> Run workflow) -> builds
#     all three; download them from the run's Artifacts section.

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write  # needed to attach archives to the release

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13          # Intel macOS -> x86_64 .app (matches the bench)
            artifact: MilleniaUI-macOS
          - os: windows-latest
            artifact: MilleniaUI-Windows
          - os: ubuntu-22.04
            artifact: MilleniaUI-Linux

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history + tags so make_version.py can describe

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Tk (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y python3-tk

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "git+https://github.com/DCC-Lab/PyHardwareLibrary.git"
          pip install pyinstaller

      - name: Set version (from tag)
        shell: bash
        run: |
          # On a release, pin to the release tag; otherwise let git describe it.
          if [ "${{ github.event_name }}" = "release" ]; then
            export MILLENIA_VERSION="${{ github.event.release.tag_name }}"
          fi
          VERSION=$(python packaging/make_version.py)
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Building MilleniaUI $VERSION"

      # --- one build step per OS (the long flag list cannot be shared across
      #     bash and PowerShell, and the icon format differs per platform) ---
      #
      # --icon / --version-file MUST be absolute: with --specpath packaging,
      # PyInstaller executes the generated spec from packaging/, so a
      # packaging-relative path (e.g. packaging/MilleniaUI.ico) re-resolves to
      # packaging/packaging/... and the build fails (FileNotFoundError).

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller --windowed --name MilleniaUI --noconfirm \
            --osx-bundle-identifier ca.ulaval.cervo.milleniaui \
            --icon "${{ github.workspace }}/packaging/MilleniaUI.icns" \
            --distpath packaging/dist --workpath packaging/build --specpath packaging \
            --collect-submodules PIL \
            --collect-all mytk --collect-all hardwarelibrary --collect-all matplotlib \
            --collect-all numpy --collect-all PIL --collect-all serial --collect-all usb \
            --collect-all pyftdi --collect-all dateutil --collect-all fontTools \
            --collect-all kiwisolver --collect-all cycler --collect-all pyparsing \
            --exclude-module pandas --exclude-module scipy --exclude-module openpyxl \
            --exclude-module et_xmlfile --exclude-module PyQt5 --exclude-module PyQt6 \
            --exclude-module PySide2 --exclude-module PySide6 --exclude-module wx \
            --exclude-module u3 --exclude-module u6 --exclude-module u12 \
            --exclude-module LabJackPython \
            millennia_ui.py

      - name: Stamp bundle version (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          PLIST="packaging/dist/MilleniaUI.app/Contents/Info.plist"
          NUM=$(echo "$VERSION" | grep -oE '^[0-9]+(\.[0-9]+){0,2}'); NUM=${NUM:-0.0.0}
          plutil -replace CFBundleShortVersionString -string "$NUM" "$PLIST"
          plutil -replace CFBundleVersion -string "$VERSION" "$PLIST"

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: >
          pyinstaller --windowed --name MilleniaUI --noconfirm
          --icon "${{ github.workspace }}/packaging/MilleniaUI.ico"
          --version-file "${{ github.workspace }}/packaging/windows_version_info.txt"
          --distpath packaging/dist --workpath packaging/build --specpath packaging
          --collect-submodules PIL
          --collect-all mytk --collect-all hardwarelibrary --collect-all matplotlib
          --collect-all numpy --collect-all PIL --collect-all serial --collect-all usb
          --collect-all pyftdi --collect-all dateutil --collect-all fontTools
          --collect-all kiwisolver --collect-all cycler --collect-all pyparsing
          --exclude-module pandas --exclude-module scipy --exclude-module openpyxl
          --exclude-module et_xmlfile --exclude-module PyQt5 --exclude-module PyQt6
          --exclude-module PySide2 --exclude-module PySide6 --exclude-module wx
          --exclude-module u3 --exclude-module u6 --exclude-module u12
          --exclude-module LabJackPython
          millennia_ui.py

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: |
          pyinstaller --windowed --name MilleniaUI --noconfirm \
            --distpath packaging/dist --workpath packaging/build --specpath packaging \
            --collect-submodules PIL \
            --collect-all mytk --collect-all hardwarelibrary --collect-all matplotlib \
            --collect-all numpy --collect-all PIL --collect-all serial --collect-all usb \
            --collect-all pyftdi --collect-all dateutil --collect-all fontTools \
            --collect-all kiwisolver --collect-all cycler --collect-all pyparsing \
            --exclude-module pandas --exclude-module scipy --exclude-module openpyxl \
            --exclude-module et_xmlfile --exclude-module PyQt5 --exclude-module PyQt6 \
            --exclude-module PySide2 --exclude-module PySide6 --exclude-module wx \
            --exclude-module u3 --exclude-module u6 --exclude-module u12 \
            --exclude-module LabJackPython \
            millennia_ui.py

      # --- package one archive per OS ---

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: cd packaging/dist && zip -r -y "../../MilleniaUI-${VERSION}-macOS.zip" MilleniaUI.app

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path packaging/dist/MilleniaUI -DestinationPath "MilleniaUI-$env:VERSION-Windows.zip"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "MilleniaUI-${VERSION}-Linux.tar.gz" -C packaging/dist MilleniaUI

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            MilleniaUI-*.zip
            MilleniaUI-*.tar.gz
          if-no-files-found: error

      - name: Attach to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            MilleniaUI-*.zip
            MilleniaUI-*.tar.gz
